steps:
  # Step 1: Build the Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/projectforpoc-489612/gkedeploymenttest:$COMMIT_SHA', '.']

  # Step 2: Get GKE Credentials (Using the correct cloud-sdk image)
  - name: 'gcr.io/://google.com'
    entrypoint: 'gcloud'
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'autopilot-cluster-1' # Your Cluster Name
      - '--region'
      - 'us-central1'        # Your Region

  # Step 3: Deploy to GKE (Using the same cloud-sdk image)
  - name: 'gcr.io/://google.com'
    entrypoint: 'kubectl'
    args:
      - 'apply'
      - '-f'
      - 'k8s-deployment.yaml'

images:
  - 'gcr.io/projectforpoc-489612/gkedeploymenttest:$COMMIT_SHA'

serviceAccount: 'projects/projectforpoc-489612/serviceAccounts/shamim-service-account@projectforpoc-489612.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
